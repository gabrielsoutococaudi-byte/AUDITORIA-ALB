// ===================== GAUGE HELPER =====================
function gaugeSVG(percent, size=54, stroke=6){
  const p = Math.max(0, Math.min(100, percent))[cite: 79];
  const r = (size - stroke) / 2[cite: 79];
  const c = 2 * Math.PI * r[cite: 79];
  const offset = c - (p/100) * c[cite: 79];
  const color = p >= 80 ? "var(--ok)" : p >= 50 ? "var(--mid)" : "var(--bad)"[cite: 79, 80];
  return `
  <span class="gauge" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--line)" stroke-width="${stroke}" fill="none"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" fill="none"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
    </svg>
    <span class="pct" style="font-size:${size*0.24}px; color:${color};">${p}%</span>
  </span>`[cite: 80];
}

// Helper para converter imagem em Base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
    reader.readAsDataURL(file);
  });
}

// ===================== FUNÇÃO EXPORTAR PDF INDIVIDUAL =====================
function exportarPdfIndividual(audit){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "portrait" });

  doc.setFontSize(16);
  doc.text("Relatório de Auditoria de Estoque - ALB", 14, 15);

  doc.setFontSize(10);
  doc.text(`Data: ${audit.data} | Turno: ${audit.turno} | Auditor: ${audit.auditor}`, 14, 22);
  doc.text(`Área: ${audit.area} | Conformidade: ${audit.percConformidade}% | Desvios: ${audit.naoConformidades}`, 14, 27);

  const tableBody = audit.items.map(item => [
    item.id,
    item.titulo,
    item.status === 'conforme' ? 'Conforme' : item.status === 'parcial' ? 'Parcial' : 'Não Conforme',
    `${item.scoreObtido}/${item.peso}`,
    item.obs || '-'
  ]);

  doc.autoTable({
    startY: 32,
    head: [["#", "Item", "Status", "Pontos", "Observação"]],
    body: tableBody,
    styles: { fontSize: 8 },
    headStyles: { fillColor: [42, 58, 99] }
  });

  let currentY = doc.lastAutoTable.finalY + 10;

  if (audit.observacoesGerais || audit.planoAcao) {
    if (currentY > 240) { doc.addPage(); currentY = 20; }
    doc.setFontSize(11);
    doc.text("Observações Gerais e Plano de Ação:", 14, currentY);
    currentY += 6;
    doc.setFontSize(9);
    
    if(audit.observacoesGerais) {
      const splitObs = doc.splitTextToSize(`Obs: ${audit.observacoesGerais}`, 180);
      doc.text(splitObs, 14, currentY);
      currentY += (splitObs.length * 5);
    }
    if(audit.planoAcao) {
      const splitPlano = doc.splitTextToSize(`Plano de Ação: ${audit.planoAcao}`, 180);
      doc.text(splitPlano, 14, currentY);
      currentY += (splitPlano.length * 5) + 4;
    }
  }

  // Anexa fotos das evidências
  const comEvidencias = audit.items.filter(i => i.base64);
  if (comEvidencias.length > 0) {
    if (currentY > 200) { doc.addPage(); currentY = 20; }
    doc.setFontSize(11);
    doc.text("Evidências Fotográficas:", 14, currentY);
    currentY += 8;

    comEvidencias.forEach(item => {
      if (currentY > 230) { doc.addPage(); currentY = 20; }
      doc.setFontSize(9);
      doc.text(`Item ${item.id}: ${item.titulo}`, 14, currentY);
      try {
        doc.addImage(item.base64, 14, currentY + 2, 50, 38);
        currentY += 45;
      } catch (e) {
        console.error("Erro ao desenhar imagem no PDF:", e);
        currentY += 6;
      }
    });
  }

  doc.save(`auditoria_${audit.area}_${audit.data}.pdf`);
}

let allAudits = [][cite: 105];

async function loadDashboard(){
  const snap = await db.collection(COLLECTION).orderBy("data","asc").get()[cite: 106];
  allAudits = snap.docs.map(d=>({id:d.id, ...d.data()}))[cite: 106];
  applyFilters()[cite: 106];
}

function applyFilters(){
  const de = document.getElementById("fltDe").value[cite: 107];
  const ate = document.getElementById("fltAte").value[cite: 107];
  const turno = document.getElementById("fltTurno").value[cite: 107];
  const area = document.getElementById("fltArea").value.trim().toLowerCase()[cite: 107];
  const auditor = document.getElementById("fltAuditor").value.trim().toLowerCase()[cite: 108];
  const status = document.getElementById("fltStatus").value[cite: 108];

  filteredAudits = allAudits.filter(a=>{
    if(de && a.data < de) return false[cite: 108];
    if(ate && a.data > ate) return false[cite: 108];
    if(turno && a.turno !== turno) return false[cite: 108];
    if(area && !(a.area||"").toLowerCase().includes(area)) return false[cite: 108];
    if(auditor && !(a.auditor||"").toLowerCase().includes(auditor)) return false[cite: 108];
    if(status === "ok" && a.percConformidade < 80) return false[cite: 108];
    if(status === "bad" && a.percConformidade >= 80) return false[cite: 108];
    return true[cite: 108];
  });
  renderKpis()[cite: 109];
  renderCharts()[cite: 109];
  renderTable()[cite: 109];
}

function renderCharts(){

  if(chartEvolucao) chartEvolucao.destroy()[cite: 113];

    options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ min:0, max:100, ticks:{color:"#8b95ab"}, grid:{color:"#232a3a"} }, x:{ ticks:{color:"#8b95ab"}, grid:{color:"#232a3a"} } }, plugins:{legend:{labels:{color:"#eef1f6"}}} }
  })[cite: 113];
  const turnos = ["Turno A","Turno B","Turno Intermediário","Turno C"][cite: 114];
  const naoConfPorTurno = turnos.map(t=>
