<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AUDITORIA ALB">
    <meta name="theme-color" content="#020202">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22AUDITORIA%20ALB%22,%22short_name%22:%22Auditoria%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%23020202%22,%22theme_color%22:%22%23ff3e3e%22,%22orientation%22:%22portrait-primary%22,%22scope%22:%22/%22}">
    <meta name="description" content="AUDITORIA ALB - Sistema de Auditoria e Controle de Estoque">
    
    <title>AUDITORIA ALB - Infinity Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
    <style>
        :root { 
            --bg: #020202;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --primary: #ff3e3e; 
            --primary-glow: rgba(255, 62, 62, 0.2);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --critico: #fbbf24; 
            --retido: #f87171; 
            --verde: #10b981; 
            --text: #f8fafc; 
            --text-secondary: #64748b;
            --neon-blue: #00f2ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
 
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: env(safe-area-inset-bottom, 40px); 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 62, 62, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.05) 0%, transparent 30%);
        }
 
        .glass-card { 
            background: var(--glass);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }
 
        #network-status { display: none; background: var(--critico); color: #000; text-align: center; padding: 8px; font-size: 10px; font-weight: 900; position: sticky; top: 0; z-index: 2000; text-transform: uppercase; letter-spacing: 2px; }
        
        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100dvh; background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(20px); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1500; padding-top: calc(60px + env(safe-area-inset-top)); border-right: 1px solid var(--glass-border); }
        .sidebar.active { left: 0; }
        .sidebar button { width: 85%; padding: 16px 20px; background: transparent; border: none; color: var(--text-secondary); text-align: left; cursor: pointer; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 12px; margin: 8px auto; border-radius: 14px; transition: 0.3s; }
        .sidebar button:hover { background: var(--glass); color: var(--text); transform: translateX(8px); }
 
        .header { padding: calc(20px + env(safe-area-inset-top)) 24px 20px 24px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 900; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); }
        .menu-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 10px; border-radius: 14px; color: white; font-size: 20px; display: flex; width: 46px; height: 46px; align-items: center; justify-content: center; cursor: pointer; }
        
        .container { width: 100%; max-width: 1200px; margin: auto; padding: 0 20px; }
 
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 24px; margin-top: 20px; }
        .stat-card { padding: 24px; position: relative; overflow: hidden; cursor: pointer; }
        .stat-card h5 { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 800; }
        .stat-card p { font-size: 30px; font-weight: 900; color: #fff; letter-spacing: -1px; }
 
        .btn-action { background: var(--primary); color: #fff; border: none; padding: 16px 28px; border-radius: 16px; font-weight: 900; cursor: pointer; font-size: 13px; box-shadow: 0 10px 20px var(--primary-glow); transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-action:active { transform: scale(0.96); }
 
        .form-box { padding: 35px; margin-bottom: 30px; margin-top: 20px; }
        .form-group label { display: block; font-size: 10px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; font-weight: 800; letter-spacing: 1.5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 18px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #fff; outline: none; font-size: 15px; transition: 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        .wms-table-container { width: 100%; overflow-x: auto; margin-top: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--glass-border); }
        .wms-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; }
        .wms-table th { background: rgba(255,255,255,0.05); padding: 14px 16px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .wms-table td { padding: 14px 16px; border-bottom: 1px solid var(--glass-border); color: var(--text); }
        
        .login-box { width: 100%; max-width: 380px; padding: 50px; text-align: center; }
    </style>
</head>
<body>
 
<div id="network-status">⚠️ MODO OFFLINE ATIVO</div>
 
<div id="sidebar" class="sidebar">
    <div style="padding: 30px; font-weight: 900; color: #fff; font-size: 22px; letter-spacing: -1.5px; display: flex; align-items: center; gap: 10px;">
        <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 10px var(--primary);"></div>
        AUDITORIA ALB
    </div>
    <button onclick="navegar('dashboard')">📊 DASHBOARD ANALYTICS</button>
    <button onclick="navegar('executar')">📋 EXECUTAR AUDITORIA</button>
    <button onclick="navegar('historico')">🔍 HISTÓRICO DE LOGS</button>
    <button onclick="logout()" style="color: var(--retido); margin-top: 40px; border-top: 1px solid var(--glass-border); border-radius: 0; width: 100%; opacity: 0.7;">🚪 ENCERRAR SESSÃO</button>
</div>
 
<div id="login-screen">
    <div style="height: 100dvh; display: flex; justify-content: center; align-items: center; padding: 20px;">
        <div class="login-box glass-card">
            <div style="width: 60px; height: 60px; background: var(--primary); border-radius: 20px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; box-shadow: 0 15px 30px var(--primary-glow);">A</div>
            <h2 style="color: #fff; margin-bottom: 10px; font-weight: 900; font-size: 26px; letter-spacing: -1px;">AUDITORIA ALB</h2>
            <p style="color: var(--text-secondary); font-size: 12px; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 1px;">Controle de Inventário</p>
            <div class="form-group" style="margin-bottom: 15px;">
                <input type="text" id="login-usuario" placeholder="Usuário / Matrícula" style="text-align: center; margin-bottom: 15px;">
                <input type="password" id="login-senha" placeholder="Senha" style="text-align: center;">
            </div>
            <button onclick="efetuarLogin()" class="btn-action" style="width: 100%; padding: 20px; font-size: 15px; margin-top: 10px;">INICIAR OPERAÇÃO</button>
        </div>
    </div>
</div>
 
<div id="app-screen" style="display: none;">
    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div style="flex-grow: 1;">
            <div id="user-name" style="font-weight: 900; font-size: 18px; letter-spacing: -0.5px; color: #fff;">Operador ALB</div>
            <div id="role-label" style="font-size: 9px; color: var(--primary); font-weight: 900; letter-spacing: 2px; text-transform: uppercase;">Auditor Oficial</div>
        </div>
        <div style="text-align: right;">
            <div id="current-time" style="font-size: 12px; font-weight: 800;">00:00</div>
            <div style="font-size: 9px; color: var(--verde); text-transform: uppercase; font-weight: 800;">Conectado</div>
        </div>
    </div>
 
    <div class="container">
        <div id="view-dashboard" class="form-box glass-card">
            <div class="stats-grid">
                <div class="stat-card glass-card"><h5>ITENS AUDITADOS</h5><p id="st-total">0</p></div>
                <div class="stat-card glass-card"><h5>CONCORDÂNCIA</h5><p id="st-critico" style="color: var(--verde);">100%</p></div>
                <div class="stat-card glass-card"><h5>DIVERGÊNCIAS</h5><p id="st-retido" style="color: var(--retido);">0</p></div>
            </div>
            <h3 style="font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Resumo Gráfico</h3>
            <div style="max-height: 250px; position: relative;">
                <canvas id="chart-auditoria"></canvas>
            </div>
        </div>

        <div id="view-executar" class="form-box glass-card" style="display: none;">
            <h3 style="font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; color: #fff;">Nova Inspeção de Auditoria</h3>
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Posição / Bin do Armazém</label>
                <input type="text" id="aud-posicao" placeholder="Ex: A-01-04">
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Código do Material</label>
                <input type="text" id="aud-material" placeholder="Ex: 10002345">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Quantidade Encontrada (Física)</label>
                <input type="number" id="aud-qtd" placeholder="0">
            </div>
            <button class="btn-action" style="width: 100%;" onclick="salvarAuditoria()">REGISTRAR NO FIRESTORE</button>
        </div>

        <div id="view-historico" class="form-box glass-card" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Log de Auditorias Realizadas</h3>
                <button class="btn-action" onclick="exportarTabelaExcel()" style="padding: 10px 15px; font-size: 10px; background: #107c41;">Exportar Excel</button>
            </div>
            <div class="wms-table-container">
                <table class="wms-table" id="tabela-auditorias-print">
                    <thead>
                        <tr>
                            <th>Posição</th>
                            <th>Material</th>
                            <th>Qtd Física</th>
                            <th>Data/Hora</th>
                        </tr>
                    </thead>
                    <tbody id="table-logs-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Suas credenciais reais inseridas com sucesso
    const firebaseConfig = {
        apiKey: "AIzaSyCDv88ZkUdd8spsekIDtU-iMbAufqWKyzA",
        authDomain: "auditoria-alb.firebaseapp.com",
        databaseURL: "https://auditoria-alb-default-rtdb.firebaseio.com",
        projectId: "auditoria-alb",
        storageBucket: "auditoria-alb.firebasestorage.app",
        messagingSenderId: "782871877045",
        appId: "1:782871877045:web:5b1610725ab6adc832f5fc",
        measurementId: "G-J932NK3MQ4"
    };

    // Inicialização segura do Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // Controle de Navegação da UI
    function navegar(tela) {
        document.getElementById('view-dashboard').style.display = 'none';
        document.getElementById('view-executar').style.display = 'none';
        document.getElementById('view-historico').style.display = 'none';
        
        document.getElementById('view-' + tela).style.display = 'block';
        toggleMenu(false);
    }

    function toggleMenu(forceClose = null) {
        const sidebar = document.getElementById('sidebar');
        if (forceClose === false) {
            sidebar.classList.remove('active');
        } else {
            sidebar.classList.toggle('active');
        }
    }

    function efetuarLogin() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        atualizarRelogio();
        inicializarGrafico();
    }

    function logout() {
        document.getElementById('app-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
    }

    function atualizarRelogio() {
        setInterval(() => {
            const agora = new Date();
            document.getElementById('current-time').innerText = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    }

    function salvarAuditoria() {
        const posicao = document.getElementById('aud-posicao').value;
        const material = document.getElementById('aud-material').value;
        const qtd = document.getElementById('aud-qtd').value;

        if(!posicao || !material || !qtd) {
            alert("Preencha todos os campos!");
            return;
        }

        db.collection("auditorias").add({
            posicao: posicao,
            material: material,
            quantidade: parseInt(qtd),
            dataHora: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            alert("Dados gravados com sucesso no Firebase!");
            document.getElementById('aud-posicao').value = '';
            document.getElementById('aud-material').value = '';
            document.getElementById('aud-qtd').value = '';
            carregarDadosTabela();
        })
        .catch((error) => {
            console.error("Erro ao salvar: ", error);
        });
    }

    function carregarDadosTabela() {
        const tbody = document.getElementById('table-logs-body');
        tbody.innerHTML = '';
        
        db.collection("auditorias").orderBy("dataHora", "desc").limit(15).get().then((querySnapshot) => {
            document.getElementById('st-total').innerText = querySnapshot.size;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${data.posicao}</b></td>
                    <td>${data.material}</td>
                    <td>${data.quantidade}</td>
                    <td>${data.dataHora ? new Date(data.dataHora.toDate()).toLocaleString('pt-BR') : 'Gravando...'}</td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    function exportarTabelaExcel() {
        const table = document.getElementById('tabela-auditorias-print');
        const wb = XLSX.utils.table_to_book(table, { sheet: "Auditorias" });
        XLSX.writeFile(wb, "Relatorio_Auditoria_ALB.xlsx");
    }

    function inicializarGrafico() {
        const ctx = document.getElementById('chart-auditoria').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Setor A', 'Setor B', 'Setor C'],
                datasets: [{
                    label: 'Itens Inspecionados',
                    data: [12, 19, 8],
                    backgroundColor: '#6366f1',
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                    x: { grid: { display: false }, ticks: { color: '#64748b' } }
                },
                plugins: { legend: { display: false } }
            }
        });
        carregarDadosTabela();
    }
</script>
</body>
</html>
